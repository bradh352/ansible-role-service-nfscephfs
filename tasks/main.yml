---
- name: "APT: Install required packages"
  ansible.builtin.apt:
    pkg:
      - "ceph-common"
      - "libcephfs2"
      - "nfs-ganesha"
      - "nfs-ganesha-ceph"
    state: present
  when: ansible_os_family == 'Debian'

- name: "DNF: Install Repo Files"
  ansible.builtin.template:
    src: "{{ item }}.j2"
    dest: "/etc/yum.repos.d/{{ item }}"
    mode: "644"
    owner: "root"
  with_items:
    - "Centos-Ceph-Squid.repo"
    - "Centos-Nfsganesha-7.repo"
  when: ansible_os_family == 'RedHat'

- name: "DNF: Install required packages"
  ansible.builtin.dnf:
    name:
      - "ceph-common"
      - "libcephfs2"
      - "libntirpc"
      - "nfs-ganesha"
      - "nfs-ganesha-ceph"
    state: present
  when: ansible_os_family == 'RedHat'

- name: "Install client keyring"
  ansible.builtin.template:
    src: ceph.client.user.keyring.j2
    dest: "/etc/ceph/ceph.client.{{ nfscephfs_cephfs_username }}.keyring"
    mode: "0600"
    owner: root

- name: "Install ceph.conf"
  ansible.builtin.template:
    src: ceph.conf.j2
    dest: "/etc/ceph/ceph.conf"
    mode: "0600"
    owner: root

- name: "UFW: Allow NFSv4 traffic"
  community.general.ufw:
    rule: allow
    port: 2049
    proto: tcp
  when: ansible_os_family == 'Debian'

- name: "FirewallD: Allow NFSv4 traffic"
  ansible.posix.firewalld:
    immediate: true
    permanent: true
    port: "2049/tcp"
    state: enabled
  when: ansible_os_family == 'RedHat'

- name: "Set idmap domain"
  community.general.ini_file:
    path: /etc/idmapd.conf
    section: "General"
    option: "Domain"
    value: "{{ nfscephfs_domain }}"

- name: "Install ganesha.conf"
  ansible.builtin.template:
    src: ganesha.conf.j2
    dest: "/etc/ganesha/ganesha.conf"
    mode: "0600"
    owner: root
  notify: restart_ganesha

- name: "Make sure there is no ceph ganesha config"
  ansible.builtin.file:
    path: /etc/ganesha/ceph.conf
    state: absent
  notify: restart_ganesha

- name: "Perform keytab tasks"
  ansible.builtin.include_tasks: "keytab.yml"
- name: "Ensure Ganesha is enabled and started"
  ansible.builtin.service:
    name: nfs-ganesha
    enabled: true
    state: started

- name: "CephFS homes"
  ansible.builtin.include_tasks: "nfshomes.yml"
  when: nfscephfs_homes is defined
